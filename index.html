<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Árbol Familiar</title>
    <style>
        :root { --azul: #4a90e2; --verde: #28a745; --gris: #f4f7f6; }
        body { font-family: sans-serif; background: var(--gris); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .btn-azul { background: var(--azul); color: white; }
        .btn-link { background: none; color: var(--azul); font-size: 13px; text-decoration: underline; }
        #app-section { display: none; width: 95%; max-width: 1000px; background: none; box-shadow: none; text-align: center; }
        .arbol-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .f-card { background: white; padding: 20px; border-radius: 12px; width: 160px; border-bottom: 5px solid var(--azul); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
    </style>

    <!-- CARGA DE LIBRERÍAS (FORMA SEGURA) -->
    <script defer src="https://gstatic.com"></script>
    <script defer src="https://gstatic.com"></script>
    <script defer src="https://gstatic.com"></script>
</head>
<body>

    <!-- SECCIÓN ACCESO -->
    <div id="auth-section" class="card">
        <h2 style="margin-top:0">🌳 Mi Árbol</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button class="btn-azul" onclick="login()">Entrar</button>
        <button class="btn-link" onclick="registro()">Registrarme por primera vez</button>
    </div>

    <!-- SECCIÓN ÁRBOL -->
    <div id="app-section">
        <button onclick="cerrarSesion()" style="width:auto; float:right; background:#666; color:white; padding: 8px 15px;">Cerrar Sesión</button>
        <h1 style="color:#333">🌳 Árbol Familiar</h1>
        <button onclick="añadirFamiliar()" style="background:var(--verde); color:white; width:auto; padding: 15px 30px; font-size: 18px;">➕ Añadir Familiar</button>
        <div id="arbol" class="arbol-grid"></div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCDpjRUFv6OXId1Ag0a_XqcQ5f9Try74Bs",
            authDomain: "://firebaseapp.com",
            projectId: "family-tree-bb9e7",
            storageBucket: "family-tree-bb9e7.firebasestorage.app",
            messagingSenderId: "353168063870",
            appId: "1:353168063870:web:bf15f68cdba86b359f472f"
        };

        // INICIALIZACIÓN CON ESPERA
        let db;
        window.addEventListener('DOMContentLoaded', () => {
            const checkFirebase = setInterval(() => {
                if (typeof firebase !== 'undefined') {
                    clearInterval(checkFirebase);
                    firebase.initializeApp(firebaseConfig);
                    db = firebase.firestore();
                    iniciarSistema();
                }
            }, 100);
        });

        function iniciarSistema() {
            firebase.auth().onAuthStateChanged(user => {
                if (user) {
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('app-section').style.display = 'block';
                    cargarArbol();
                } else {
                    document.getElementById('auth-section').style.display = 'block';
                    document.getElementById('app-section').style.display = 'none';
                }
            });
        }

        function registro() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || p.length < 6) return alert("Escribe un email y una clave de al menos 6 letras.");
            firebase.auth().createUserWithEmailAndPassword(e, p)
                .then(() => alert("¡Cuenta creada! Ya puedes añadir familiares."))
                .catch(err => alert("Error: " + err.message));
        }

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            firebase.auth().signInWithEmailAndPassword(e, p).catch(err => alert("Error: " + err.message));
        }

        function cerrarSesion() { firebase.auth().signOut(); }

        function añadirFamiliar() {
            const n = prompt("Nombre completo:");
            const p = prompt("Parentesco (ej: Abuela, Primo...):");
            if(n && db) {
                db.collection("familiares").add({
                    nombre: n,
                    parentesco: p || "Familiar",
                    creadoPor: firebase.auth().currentUser.email,
                    fecha: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }

        function cargarArbol() {
            db.collection("familiares").orderBy("fecha", "asc").onSnapshot(snap => {
                const cont = document.getElementById('arbol');
                cont.innerHTML = '';
                snap.forEach(doc => {
                    const f = doc.data();
                    cont.innerHTML += `<div class="f-card"><strong>${f.nombre}</strong><br><small style="color:#888">${f.parentesco}</small></div>`;
                });
            });
        }
    </script>
</body>
</html>
