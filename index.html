<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Árbol Familiar</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 280px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; background: #4a90e2; color: white; }
    </style>
</head>
<body>
    <div id="auth-section" class="card">
        <h2>🌳 Mi Árbol</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Clave (6+ letras)">
        <button onclick="login()">ENTRAR</button>
        <button style="background:none; color:#4a90e2; font-size:12px;" onclick="registro()">REGISTRARME AQUÍ</button>
    </div>
    <div id="app-section" style="display:none; text-align:center;">
        <h1>🌳 Panel Familiar</h1>
        <button onclick="add()" style="background:#28a745; width:auto; padding: 15px 30px;">➕ Añadir Familiar</button>
        <div id="lista" style="margin-top:20px;"></div>
    </div>
    <script>
        const config = {
            apiKey: "AIzaSyCDpjRUFv6OXId1Ag0a_XqcQ5f9Try74Bs",
            authDomain: "://firebaseapp.com",
            projectId: "family-tree-bb9e7",
            storageBucket: "family-tree-bb9e7.firebasestorage.app",
            messagingSenderId: "353168063870",
            appId: "1:353168063870:web:bf15f68cdba86b359f472f"
        };
        
        // Esperar a Google
        const timer = setInterval(() => {
            if (typeof firebase !== 'undefined') {
                clearInterval(timer);
                firebase.initializeApp(config);
                firebase.auth().onAuthStateChanged(user => {
                    document.getElementById('auth-section').style.display = user ? 'none' : 'block';
                    document.getElementById('app-section').style.display = user ? 'block' : 'none';
                    if(user) show();
                });
            }
        }, 500);

        function registro() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            firebase.auth().createUserWithEmailAndPassword(e, p).then(() => alert("¡Ok!")).catch(err => alert(err.message));
        }
        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            firebase.auth().signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        }
        function add() {
            const n = prompt("Nombre:");
            if(n) firebase.firestore().collection("familiares").add({ nombre: n, fecha: Date.now() });
        }
        function show() {
            firebase.firestore().collection("familiares").orderBy("fecha", "asc").onSnapshot(snap => {
                const l = document.getElementById('lista'); l.innerHTML = '';
                snap.forEach(doc => { l.innerHTML += `<div style="background:white; padding:10px; margin:5px; border-radius:5px;">${doc.data().nombre}</div>`; });
            });
        }
    </script>
</body>
</html>
