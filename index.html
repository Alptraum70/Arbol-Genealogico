<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Árbol Familiar</title>
    
    <!-- LIBRERÍAS DE GOOGLE CORREGIDAS -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --azul: #4a90e2; --verde: #28a745; --gris: #f4f7f6; }
        body { font-family: sans-serif; background: var(--gris); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; background: var(--azul); color: white; }
        #app-section { display: none; width: 95%; max-width: 1000px; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .f-card { background: white; padding: 20px; border-radius: 12px; width: 160px; border-bottom: 5px solid var(--azul); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="auth-section" class="card">
        <h2>🌳 Acceso al Árbol</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña (mín. 6 letras)">
        <button onclick="login()">Entrar</button>
        <button style="background:none; color:var(--azul); border:none; cursor:pointer;" onclick="registro()">Registrarme por primera vez</button>
    </div>

    <div id="app-section">
        <button onclick="firebase.auth().signOut()" style="width:auto; float:right; background:#666; color:white; padding: 8px 15px;">Cerrar Sesión</button>
        <h1 style="color:#333">🌳 Árbol Familiar</h1>
        <button onclick="add()" style="background:var(--verde); color:white; width:auto; padding: 15px 30px; font-size: 18px;">➕ Añadir Familiar</button>
        <div id="arbol" class="grid"></div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyCDpjRUFv6OXId1Ag0a_XqcQ5f9Try74Bs",
            authDomain: "://firebaseapp.com",
            projectId: "family-tree-bb9e7",
            storageBucket: "family-tree-bb9e7.firebasestorage.app",
            messagingSenderId: "353168063870",
            appId: "1:353168063870:web:bf15f68cdba86b359f472f"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                show();
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('app-section').style.display = 'none';
            }
        });

        function registro() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || p.length < 6) return alert("Email y clave (mín. 6 letras) necesarios.");
            firebase.auth().createUserWithEmailAndPassword(e, p)
                .then(() => alert("¡Registrado con éxito! Ya puedes entrar."))
                .catch(err => alert("Error: " + err.message));
        }

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            firebase.auth().signInWithEmailAndPassword(e, p).catch(err => alert("Error: " + err.message));
        }

        function add() {
            const n = prompt("Nombre completo:");
            if(n) db.collection("familiares").add({ nombre: n, fecha: Date.now() });
        }

        function show() {
            db.collection("familiares").orderBy("fecha", "asc").onSnapshot(snap => {
                const cont = document.getElementById('arbol');
                cont.innerHTML = '';
                snap.forEach(doc => {
                    cont.innerHTML += `<div class="f-card"><strong>${doc.data().nombre}</strong></div>`;
                });
            });
        }
    </script>
</body>
</html>
