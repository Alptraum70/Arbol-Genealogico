<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Árbol Familiar</title>
    <style>
        :root { --azul: #4a90e2; --verde: #28a745; --gris: #f4f7f6; }
        body { font-family: sans-serif; background: var(--gris); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-azul { background: var(--azul); color: white; }
        .btn-link { background: none; color: var(--azul); font-size: 13px; }
        #app-section { display: none; width: 90%; max-width: 1000px; background: none; box-shadow: none; }
        .arbol-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .f-card { background: white; padding: 15px; border-radius: 10px; width: 150px; border-bottom: 4px solid var(--azul); }
    </style>

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

    <!-- SECCIÓN ACCESO -->
    <div id="auth-section" class="card">
        <h2>🌳 Acceso al Árbol</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña (mín. 6 caracteres)">
        <button class="btn-azul" onclick="login()">Entrar al Árbol</button>
        <button class="btn-link" onclick="registro()">¿Primera vez? Regístrate aquí</button>
    </div>

    <!-- SECCIÓN ÁRBOL -->
    <div id="app-section">
        <button onclick="firebase.auth().signOut()" style="width:auto; float:right; background:#666; color:white;">Cerrar Sesión</button>
        <h1>🌳 Nuestro Árbol Familiar</h1>
        <button onclick="añadirFamiliar()" style="background:var(--verde); color:white; width:auto; padding: 15px 30px;">➕ Añadir Familiar</button>
        <div id="arbol" class="arbol-grid"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCDpjRUFv6OXId1Ag0a_XqcQ5f9Try74Bs",
            authDomain: "://firebaseapp.com",
            projectId: "family-tree-bb9e7",
            storageBucket: "family-tree-bb9e7.firebasestorage.app",
            messagingSenderId: "353168063870",
            appId: "1:353168063870:web:bf15f68cdba86b359f472f"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function registro() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || p.length < 6) return alert("Por favor, pon un email y una clave de al menos 6 letras.");
            
            auth.createUserWithEmailAndPassword(e, p)
                .then(() => alert("¡Cuenta creada con éxito!"))
                .catch(err => alert("Error: " + err.message));
        }

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert("Error: " + err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                document.body.style.alignItems = 'flex-start';
                cargarArbol();
            } else {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('app-section').style.display = 'none';
                document.body.style.alignItems = 'center';
            }
        });

        function añadirFamiliar() {
            const n = prompt("Nombre completo:");
            const p = prompt("Parentesco (ej: Abuela, Primo...):");
            if(n) {
                db.collection("familiares").add({
                    nombre: n,
                    parentesco: p || "Familiar",
                    creadoPor: auth.currentUser.email,
                    fecha: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }

        function cargarArbol() {
            db.collection("familiares").orderBy("fecha", "asc").onSnapshot(snap => {
                const cont = document.getElementById('arbol');
                cont.innerHTML = '';
                snap.forEach(doc => {
                    const f = doc.data();
                    cont.innerHTML += `<div class="f-card"><strong>${f.nombre}</strong><br><small>${f.parentesco}</small></div>`;
                });
            });
        }
    </script>
</body>
</html>
